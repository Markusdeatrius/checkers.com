services:
  checkers_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  checkers_backend:
    build:
      context: ./app/server
    env_file:
      - .env
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    depends_on:
      checkers_db:
        condition: service_healthy
    restart: always

  checkers_frontend:
    build:
      context: ./app/web
    depends_on:
      - checkers_backend
    restart: always

  checkers_gateway:
    build:
      context: ./app/caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - checkers_frontend
      - checkers_backend


volumes:
  db_data:
  caddy_data:
  caddy_config: