services:
  checkers_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  checkers_backend:
    build:
      context: ./app/server
    env_file:
      - .env
    depends_on:
      checkers_db:
        condition: service_healthy
    restart: always


  checkers_frontend:
    build:
      context: ./app/web
    depends_on:
      - checkers_backend
    restart: always

  checkers_gateway:
    build:
      context: ./Caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - checkers_frontend
      - checkers_backend

  portainer:
    image: portainer/portainer-ce:lts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9443:9443"
      - "8000:8000"

networks:
  default:
    name: portainer_network

volumes:
  db_data:
  caddy_data:
  caddy_config:
  portainer_data: